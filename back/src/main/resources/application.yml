server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/planningdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  # Em produção, defina a variável de ambiente JWT_SECRET com uma string aleatória de pelo menos 32 caracteres.
  secret: ${JWT_SECRET:planning-poker-dev-insecure-secret-key-change-in-prod-abc123!}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.planningapp.security: DEBUG
