services:

  db:
    image: postgres:16-alpine
    container_name: planning-db
    environment:
      POSTGRES_DB: planningdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: planning-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8081
      DB_URL: jdbc:postgresql://db:5432/planningdb
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: planning-poker-local-secret-change-in-prod
      ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./front/planning-poker
      dockerfile: Dockerfile
      args:
        # O browser acessa o backend pelo host, não pela rede interna do Docker
        API_URL: http://localhost:8081
    container_name: planning-frontend
    depends_on:
      - backend
    environment:
      PORT: 4200
    ports:
      - "4200:4200"

volumes:
  postgres-data:
