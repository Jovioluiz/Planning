<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>
    <form (ngSubmit)="login($event)" novalidate>
      <input
        type="text"
        [(ngModel)]="usuario"
        name="usuario"
        placeholder="Usuário"
        required
        [disabled]="carregando"
      />
      <input
        type="password"
        [(ngModel)]="senha"
        name="senha"
        placeholder="Senha"
        required
        [disabled]="carregando"
      />
      <select [(ngModel)]="perfil" name="perfil" required [disabled]="carregando">
        <option value="" disabled selected>Selecione um perfil</option>
        <option value="ADMIN">Administrador</option>
        <option value="JOGADOR">Desenvolvedor</option>
        <option value="OBSERVADOR">Observador</option>
      </select>
      <button type="submit" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
    <p *ngIf="erro" class="erro">{{ erro }}</p>
  </div>
</div>
