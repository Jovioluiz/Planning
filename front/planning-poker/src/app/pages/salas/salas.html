<div class="salas-page">

  <header class="salas-header">
    <div class="header-brand">
      <span class="brand-icon">🦶</span>
      <span class="brand-name">Chutômetro</span>
    </div>
    <div class="header-user">
      <span class="user-name">{{ auth.getUsuario() }}</span>
      <button class="btn-logout" (click)="logout()">Sair</button>
    </div>
  </header>

  <div class="salas-content">

    <div class="salas-title-row">
      <h1 class="page-title">Minhas Salas</h1>
    </div>

    <!-- Formulário de criação -->
    <div class="criar-sala-card">
      <h2 class="criar-titulo">Nova sala de estimativa</h2>
      <div class="criar-form">
        <input
          type="text"
          [(ngModel)]="novaNome"
          placeholder="Ex: Sprint 42 – Time Backend"
          class="input-nome"
          [disabled]="criando"
          (keyup.enter)="criarSala()"
        />
        <button class="btn-criar" (click)="criarSala()" [disabled]="criando || !novaNome.trim()">
          <span *ngIf="!criando">+ Criar sala</span>
          <span *ngIf="criando" class="spinner-row"><span class="spinner"></span> Criando...</span>
        </button>
      </div>
      <p *ngIf="erro" class="erro">{{ erro }}</p>
    </div>

    <!-- Lista de salas -->
    <div *ngIf="carregando" class="loading-state">
      <span class="spinner spinner-dark"></span> Carregando salas...
    </div>

    <div *ngIf="!carregando && salas.length === 0" class="empty-state">
      <p>Você ainda não criou nenhuma sala. Crie a primeira acima!</p>
    </div>

    <div *ngIf="!carregando && salas.length > 0" class="salas-grid">
      <div *ngFor="let sala of salas" class="sala-card">
        <div class="sala-card-top">
          <div class="sala-status" [class.ativa]="sala.ativa" [class.inativa]="!sala.ativa">
            {{ sala.ativa ? 'Ativa' : 'Inativa' }}
          </div>
          <h3 class="sala-nome">{{ sala.nome }}</h3>
          <p class="sala-membros">{{ sala.membros.length }} participante(s)</p>
        </div>

        <div class="sala-link-row">
          <input
            type="text"
            class="link-input"
            [value]="getLinkCompartilhavel(sala.codigo)"
            readonly
          />
          <button
            class="btn-copiar"
            (click)="copiarLink(sala.codigo)"
            [class.copiado]="linkCopiado === sala.codigo"
          >
            {{ linkCopiado === sala.codigo ? '✓ Copiado' : 'Copiar link' }}
          </button>
        </div>

        <button class="btn-abrir" (click)="abrirSala(sala)">
          Gerenciar sala →
        </button>
      </div>
    </div>

  </div>
</div>
