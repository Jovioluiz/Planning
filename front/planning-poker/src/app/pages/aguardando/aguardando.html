<div class="aguardando-page">
  <div class="content">

    <!-- ── Cena do chute ────────────────────────── -->
    <div class="coffee-scene">

      <!-- Pé chutador (wrapper anima posição, inner faz o flip) -->
      <div class="foot-kick">
        <span class="foot-inner">🦶</span>
      </div>

      <!-- Vapor (para durante o chute) -->
      <div class="steam-group">
        <div class="wisp w1"></div>
        <div class="wisp w2"></div>
        <div class="wisp w3"></div>
      </div>

      <!-- Gotículas de café que voam no impacto -->
      <div class="splash-group">
        <span class="drop dp1">☕</span>
        <span class="drop dp2">·</span>
        <span class="drop dp3">·</span>
        <span class="drop dp4">·</span>
      </div>

      <!-- Conjunto xícara + pires -->
      <div class="cup-float">
        <div class="cup">
          <div class="rim"></div>
          <div class="coffee">
            <div class="coffee-glare"></div>
          </div>
          <div class="handle"></div>
        </div>
        <div class="saucer">
          <div class="saucer-inner"></div>
        </div>
      </div>

    </div>

    <!-- ── Texto ─────────────────────────────────── -->
    <h2 class="title">Aguardando próxima tarefa</h2>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="subtitle">O administrador liberará a votação em breve</p>

    <button class="btn-sair" (click)="logout()">Sair</button>

  </div>
</div>
