<div class="aguardando-page" [class.sala-encerrada-mode]="salaEncerrada">

  <!-- ── Header ──────────────────────────────────────── -->
  <header class="aguardando-header">
    <div class="header-brand">
      <span class="brand-icon">🦶</span>
      <span class="brand-name">Chutômetro</span>
    </div>
    <div class="header-user">
      <span class="user-avatar">{{ (usuario || 'U')[0].toUpperCase() }}</span>
      <span class="user-name">{{ usuario }}</span>
      <button class="btn-logout" (click)="logout()">Sair</button>
    </div>
  </header>

  <!-- ── Sala encerrada ──────────────────────────────── -->
  <div *ngIf="salaEncerrada" class="sala-encerrada-overlay">
    <div class="sala-encerrada-card">
      <div class="sala-encerrada-icon">🔒</div>
      <h2>Sala Encerrada</h2>
      <p>O moderador saiu da sala. Você será redirecionado em instantes...</p>
    </div>
  </div>

  <!-- ── Conteúdo central ─────────────────────────────── -->
  <div class="content" [style.opacity]="salaEncerrada ? '0.3' : '1'">

    <!-- Xícara flutuando com vapor (sem animação de chute) -->
    <div class="coffee-scene">
      <div class="steam-group">
        <div class="wisp w1"></div>
        <div class="wisp w2"></div>
        <div class="wisp w3"></div>
      </div>
      <div class="cup-float">
        <div class="cup">
          <div class="rim"></div>
          <div class="coffee">
            <div class="coffee-glare"></div>
          </div>
          <div class="handle"></div>
        </div>
        <div class="saucer">
          <div class="saucer-inner"></div>
        </div>
      </div>
    </div>

    <h2 class="title">Aguardando próxima tarefa</h2>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="subtitle">O moderador liberará a votação em breve</p>

  </div>
</div>
