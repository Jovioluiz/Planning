<div class="aguardando-page">
  <div class="content">

    <!-- ── Cena do café ─────────────────────────── -->
    <div class="coffee-scene">

      <!-- Vapor -->
      <div class="steam-group">
        <div class="wisp w1"></div>
        <div class="wisp w2"></div>
        <div class="wisp w3"></div>
      </div>

      <!-- Conjunto xícara + pires (flutua) -->
      <div class="cup-float">

        <!-- Xícara -->
        <div class="cup">
          <!-- Borda superior -->
          <div class="rim"></div>
          <!-- Café dentro -->
          <div class="coffee">
            <div class="coffee-glare"></div>
          </div>
          <!-- Alça -->
          <div class="handle"></div>
        </div>

        <!-- Pires -->
        <div class="saucer">
          <div class="saucer-inner"></div>
        </div>

      </div>
    </div>

    <!-- ── Texto ─────────────────────────────────── -->
    <h2 class="title">Aguardando próxima tarefa</h2>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="subtitle">O administrador liberará a votação em breve</p>

    <button class="btn-sair" (click)="logout()">Sair</button>

  </div>
</div>
